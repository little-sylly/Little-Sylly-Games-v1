<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#EC4899" />
    <meta name="description" content="Serious games for silly people." />
    <link rel="manifest" href="manifest.json" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="css/styles.css" />

    <title>Little Sylly Games</title>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center font-['Fredoka']">

    <section id="screen-lobby" class="relative flex flex-col items-center justify-center px-6 py-12 text-center min-h-screen w-full">
        
        <div class="absolute top-6 right-6">
            <button class="btn-open-sound text-2xl p-2 bg-white/50 rounded-full shadow-sm hover:bg-white transition-colors">
                🔊
            </button>
        </div>

        <div class="mb-8">
            <div class="text-6xl mb-4 animate-bounce">🎮</div>
            <h1 class="text-5xl font-black text-stone-800 tracking-tight mb-2">
                Little Sylly <span class="text-pink-500">Games</span>
            </h1>
            <p class="text-stone-500 font-medium text-lg">What are we playing today?</p>
        </div>

        <div class="flex flex-col gap-4 w-full max-w-sm">
            <button onclick="playPillClick(); showScreen('screen-menu')" 
                    class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-5 px-8 rounded-2xl shadow-lg active:scale-95 transition-all text-xl">
                Don't Say Those Words
            </button>

            <button onclick="playPillClick(); showScreen('screen-gm-menu')" 
                    class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-5 px-8 rounded-2xl shadow-lg active:scale-95 transition-all text-xl">
                Great Minds
            </button>

            <button onclick="playPillClick(); showScreen('screen-ss-menu')" 
                    class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-5 px-8 rounded-2xl shadow-lg active:scale-95 transition-all text-xl">
                Sylly Signals
            </button>
        </div>
    </section>

    <section id="screen-menu" class="hidden flex-col items-center justify-center p-6 min-h-screen">
        <h2 class="text-3xl font-bold mb-4">Don't Say Those Words</h2>
        <button onclick="showScreen('screen-lobby')" class="text-stone-500 underline">Back to Lobby</button>
    </section>

    <section id="screen-gm-menu" class="hidden flex-col items-center justify-center p-6 min-h-screen">
        <h2 class="text-3xl font-bold mb-4">Great Minds</h2>
        <button onclick="showScreen('screen-lobby')" class="text-stone-500 underline">Back to Lobby</button>
    </section>

    <section id="screen-ss-menu" class="hidden flex-col items-center justify-center p-6 min-h-screen">
        <h2 class="text-3xl font-bold mb-4">Sylly Signals</h2>
        <button onclick="showScreen('screen-lobby')" class="text-stone-500 underline">Back to Lobby</button>
    </section>

    <div id="sound-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-center">Sound Settings</h3>
            
            <div class="flex items-center justify-between mb-8">
                <span class="font-bold text-lg">Mute Sounds</span>
                <button id="global-mute-toggle" class="sylly-toggle-off px-4 py-2 rounded-xl font-bold transition-colors">OFF</button>
            </div>

            <div id="global-volume-group" class="mb-8">
                <div class="flex justify-between mb-2">
                    <span class="font-bold">Volume</span>
                    <span id="global-volume-label" class="text-pink-500 font-bold">60%</span>
                </div>
                <input type="range" id="global-sound-volume" min="0" max="100" value="60" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-pink-500">
            </div>

            <button id="btn-sound-overlay-done" class="w-full bg-stone-800 text-white font-bold py-4 rounded-2xl hover:bg-stone-900 transition-colors">
                Done
            </button>
        </div>
    </div>

    <button id="btn-mute" class="hidden">🔊</button>

    <script src="js/engine.js"></script>
