<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#EC4899" />
  <meta name="description" content="Serious games for silly people." />
  
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />

  <script src="js/lib/tailwind-play.js"></script> 

  <link rel="stylesheet" href="css/styles.css" />

  <title>Little Sylly Games</title>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center">

  <section id="screen-lobby" class="relative flex flex-col items-center justify-center px-6 py-12 w-full max-w-sm mx-auto text-center gap-6">
    <button class="btn-open-sound absolute top-4 right-4 text-xl text-stone-400 active:scale-90 transition-transform duration-100">🔊</button>
    <div class="text-6xl" role="img" aria-label="Game controller">🎮</div>
    <div>
      <h1 class="text-5xl font-bold leading-tight text-stone-800">Little Sylly</h1>
      <h1 class="text-5xl font-bold leading-tight text-pink-500">Games</h1>
    </div>
    <p class="text-stone-500 text-lg">What are we playing today?</p>
    <div class="flex flex-col gap-4 w-full mt-2">
      <button id="btn-dstw" class="min-h-14 w-full rounded-2xl bg-pink-500 hover:bg-pink-600 active:scale-95 text-white text-xl font-semibold transition-all duration-150">
        Don't Say Those Words
      </button>
      <button id="btn-great-minds" class="min-h-14 w-full rounded-2xl bg-violet-500 hover:bg-violet-600 active:scale-95 text-white text-xl font-semibold transition-all duration-150">
        Great Minds
      </button>
      <button id="btn-sylly-signals" class="min-h-14 w-full rounded-2xl bg-teal-500 hover:bg-teal-600 active:scale-95 text-white text-xl font-semibold transition-all duration-150">
        Sylly Signals
      </button>
    </div>
  </section>

  <main id="screen-menu" style="display:none" class="relative flex flex-col items-center justify-center px-6 py-12 w-full max-w-sm mx-auto text-center gap-6">
    <button class="btn-open-sound absolute top-4 right-4 text-xl text-stone-400 active:scale-90 transition-transform duration-100">🔊</button>
    <div class="text-6xl" role="img" aria-label="Speech balloon">💬</div>
    <div>
      <h1 class="text-5xl font-bold leading-tight text-stone-800">Don't Say</h1>
      <h1 class="text-5xl font-bold leading-tight text-pink-500">Those Words</h1>
    </div>
    <p class="text-stone-500 text-lg">Just make sure you don't say those words!</p>
    <div class="flex flex-col gap-4 w-full mt-2">
      <button id="btn-play" class="min-h-14 w-full rounded-2xl bg-pink-500 hover:bg-pink-600 active:scale-95 text-white text-xl font-semibold transition-all duration-150">
        Let's Play!
      </button>
      <button id="btn-how-to" class="min-h-14 w-full rounded-2xl bg-stone-700 hover:bg-stone-800 active:scale-95 text-white text-xl font-semibold transition-all duration-150">
        How to Play
      </button>
      <button id="btn-settings" class="min-h-14 w-full rounded-2xl bg-blue-600 hover:bg-blue-700 active:scale-95 text-white text-xl font-semibold transition-all duration-150">
        Settings
      </button>
      <button id="btn-back-to-lobby" class="min-h-11 w-full rounded-2xl bg-stone-200 hover:bg-stone-300 active:scale-95 text-stone-500 text-base font-medium transition-all duration-150">
        ← Back to the Box
      </button>
    </div>
  </main>

  <section id="screen-setup" style="display:none" class="relative flex flex-col items-center justify-center px-6 py-12 w-full max-w-sm mx-auto text-center gap-6">
    <div class="absolute top-4 right-4 flex items-center gap-2">
      <button class="btn-open-sound text-xl text-stone-400 active:scale-90 transition-transform duration-100">🔊</button>
      <button id="btn-setup-exit" class="text-xl text-stone-500 font-bold active:scale-90 transition-transform duration-100">✕</button>
    </div>
    <div class="text-5xl" role="img" aria-label="People">👥</div>
    <div>
      <h2 class="text-3xl font-bold text-stone-800">Who's playing?</h2>
      <p class="text-stone-400 text-base mt-1">Leave blank to use Team 1 &amp; Team 2</p>
    </div>
    <div class="flex flex-col gap-4 w-full text-left">
      <div>
        <label class="text-stone-500 text-sm font-semibold uppercase tracking-widest block mb-1">Team 1 name</label>
        <input id="input-team1" type="text" maxlength="20" placeholder="e.g. The Legends"
          class="w-full rounded-xl border-2 border-stone-200 bg-white px-4 py-3 text-lg text-stone-800 placeholder-stone-300 focus:border-pink-400 focus:outline-none transition-colors" />
      </div>
      <div>
        <label class="text-stone-500 text-sm font-semibold uppercase tracking-widest block mb-1">Team 2 name</label>
        <input id="input-team2" type="text" maxlength="20" placeholder="e.g. The Underdogs"
          class="w-full rounded-xl border-2 border-stone-200 bg-white px-4 py-3 text-lg text-stone-800 placeholder-stone-300 focus:border-pink-400 focus:outline-none transition-colors" />
      </div>
    </div>
    <button id="btn-start-game" class="min-h-14 w-full rounded-2xl bg-pink-500 hover:bg-pink-600 active:scale-95 text-white text-xl font-semibold transition-all duration-150">
      Let's Go! 🚀
    </button>
  </section>

  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Fixed: Removed leading slash for GitHub Pages
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered!'))
          .catch(err => console.log('Service Worker failed:', err));
      });
    }
  </script>
</body>
</html>
